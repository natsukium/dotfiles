name: terraform
on:
  pull_request:
    branches:
      - main
    paths:
      - 'infra/**'
      - '.github/workflows/terraform.yml'
      - 'flake.lock'
  push:
    branches:
      - main
    paths:
      - 'infra/**'
      - '.github/workflows/terraform.yml'
      - 'flake.lock'
permissions:
  id-token: write
  contents: read
  pull-requests: write
jobs:
  detect:
    runs-on: ubuntu-slim
    timeout-minutes: 5
    outputs:
      directories: ${{ steps.build-matrix.outputs.directories }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            github:
              - 'infra/services/github/**'
            cloudflare:
              - 'infra/global/domains/natsukium-com/**'
            state:
              - 'infra/global/state/**'
            oidc:
              - 'infra/global/oidc/**'
            aws_organization:
              - 'infra/aws/organization/**'
            aws_identity_center:
              - 'infra/aws/identity-center/**'
            aws_accounts_research:
              - 'infra/aws/accounts/research/**'
            aws_security_baseline:
              - 'infra/aws/security-baseline/**'
            shared:
              - 'flake.lock'
              - '.github/workflows/terraform.yml'
      - id: build-matrix
        run: |
          all_dirs=(
            "infra/services/github"
            "infra/global/domains/natsukium-com"
            "infra/global/state"
            "infra/global/oidc"
            "infra/aws/organization"
            "infra/aws/identity-center"
            "infra/aws/accounts/research"
            "infra/aws/security-baseline"
          )
          if [[ "${{ steps.filter.outputs.shared }}" == "true" ]]; then
            directories=$(jq -nc --args '$ARGS.positional' -- "${all_dirs[@]}")
          else
            dirs=()
            if [[ "${{ steps.filter.outputs.github }}" == "true" ]]; then
              dirs+=("infra/services/github")
            fi
            if [[ "${{ steps.filter.outputs.cloudflare }}" == "true" ]]; then
              dirs+=("infra/global/domains/natsukium-com")
            fi
            if [[ "${{ steps.filter.outputs.state }}" == "true" ]]; then
              dirs+=("infra/global/state")
            fi
            if [[ "${{ steps.filter.outputs.oidc }}" == "true" ]]; then
              dirs+=("infra/global/oidc")
            fi
            if [[ "${{ steps.filter.outputs.aws_organization }}" == "true" ]]; then
              dirs+=("infra/aws/organization")
            fi
            if [[ "${{ steps.filter.outputs.aws_identity_center }}" == "true" ]]; then
              dirs+=("infra/aws/identity-center")
            fi
            if [[ "${{ steps.filter.outputs.aws_accounts_research }}" == "true" ]]; then
              dirs+=("infra/aws/accounts/research")
            fi
            if [[ "${{ steps.filter.outputs.aws_security_baseline }}" == "true" ]]; then
              dirs+=("infra/aws/security-baseline")
            fi
            directories=$(jq -nc --args '$ARGS.positional' -- "${dirs[@]}")
          fi
          echo "directories=$directories" >> "$GITHUB_OUTPUT"
  terraform:
    needs: detect
    if: needs.detect.outputs.directories != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        directory: ${{ fromJson(needs.detect.outputs.directories) }}
    env:
      SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-nix
      - uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ vars.AWS_PLAN_ROLE_ARN }}
          aws-region: us-east-2
      - name: Terraform Init
        working-directory: ${{ matrix.directory }}
        run: nix develop .#terraform -c terraform init
      - name: Terraform Format
        working-directory: ${{ matrix.directory }}
        run: nix develop .#terraform -c terraform fmt -check
      - name: Terraform Plan
        id: plan
        working-directory: ${{ matrix.directory }}
        run: |
          set +e
          nix develop .#terraform -c terraform plan -no-color -lock=false -out=tfplan > plan.txt 2>&1
          exit_code=$?
          {
            echo "stdout<<EOF"
            sed -n '/Terraform used the selected providers/,$ p' plan.txt || cat plan.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "has_changes=$( ! grep -q 'No changes' plan.txt && echo true || echo false)" >> "$GITHUB_OUTPUT"
          exit $exit_code
        continue-on-error: true
      - name: Comment PR
        if: github.event_name == 'pull_request' && steps.plan.outputs.has_changes == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const output = `#### Terraform Plan: \`${{ matrix.directory }}\` 📖
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output,
            });
      - name: Terraform Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1
      - name: Configure AWS Credentials for Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ vars.AWS_APPLY_ROLE_ARN }}
          aws-region: us-east-2
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: ${{ matrix.directory }}
        run: nix develop .#terraform -c terraform apply tfplan
