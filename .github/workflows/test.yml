name: build and cache
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - '.github/actions/setup-nix/**'
      - '.github/workflows/test.yml'
      - 'applications/**'
      - 'flake.lock'
      - 'flake.nix'
      - 'homes/**'
      - 'hosts/**'
      - 'lib/**'
      - 'modules/**'
      - 'overlays/**'
      - 'pkgs/**'
      - 'systems/**'
      - 'tests/**'
jobs:
  changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: read
    outputs:
      nix: ${{ steps.filter.outputs.nix }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            nix:
              - '.github/actions/setup-nix/**'
              - '.github/workflows/test.yml'
              - 'applications/**'
              - 'flake.lock'
              - 'flake.nix'
              - 'homes/**'
              - 'hosts/**'
              - 'lib/**'
              - 'modules/**'
              - 'overlays/**'
              - 'pkgs/**'
              - 'systems/**'
              - 'tests/**'
  check:
    needs: changes
    if: ${{ !cancelled() && (needs.changes.outputs.nix == 'true' || github.event_name == 'push') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      # required for the niks3 cache to authenticate via GitHub OIDC
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-nix
      - name: Check flake
        run: nix flake check --no-build --all-systems --keep-going
  build:
    needs: [changes, check]
    if: ${{ !cancelled() && needs.check.result != 'failure' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    permissions:
      contents: read
      # required for the niks3 cache to authenticate via GitHub OIDC
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: needs.check.result == 'success'
      # macos runners ship with only ~14GB free, which is exhausted by
      # large builds like emacs-plus and terraform-provider-cloudflare.
      # Drop the bundled toolchains we never use to reclaim space before
      # the nix store grows.
      - name: Free disk space (darwin)
        if: needs.check.result == 'success' && matrix.os == 'macos-latest'
        run: |
          sudo rm -rf \
            /Applications/Xcode_*.app \
            /Library/Developer/CoreSimulator \
            /Library/Android \
            ~/.dotnet \
            /usr/local/share/chromium \
            /usr/local/lib/node_modules \
            /usr/local/share/powershell || true
          df -h
      - uses: ./.github/actions/setup-nix
        if: needs.check.result == 'success'
      - name: Create /run for darwin
        if: needs.check.result == 'success' && matrix.os == 'macos-latest'
        run: |
          printf "run\tprivate/var/run\n" | sudo tee -a /etc/synthetic.conf
          /System/Library/Filesystems/apfs.fs/Contents/Resources/apfs.util -t || true
      - name: build
        if: needs.check.result == 'success'
        run: |
          export MAKEFLAGS="NIX:=nix"
          make build
          df -h
